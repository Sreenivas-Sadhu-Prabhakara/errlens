<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden;
    background:
      radial-gradient(60% 60% at 50% 38%, #17222E, #0F1720 82%);
  }
  body { display: grid; place-items: center; }
  /* 12% safe padding on each side -> mark fills the middle ~76vmin */
  .mark { width: 76vmin; height: 76vmin; display: block; }
  .lens { fill: none; stroke: #3BE0C6; }
  .cross { stroke: #3BE0C6; stroke-linecap: round; }
</style>
</head>
<body>
  <!-- a lens / crosshair scanning for the error: the errlens mark -->
  <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
    <!-- faint outer reticle ring -->
    <circle class="lens" cx="43" cy="43" r="37" stroke-width="1.6" opacity="0.28"/>
    <!-- lens body -->
    <circle class="lens" cx="43" cy="43" r="28" stroke-width="7"/>
    <!-- crosshair inside the lens -->
    <line class="cross" x1="43" y1="26" x2="43" y2="60" stroke-width="4" opacity="0.9"/>
    <line class="cross" x1="26" y1="43" x2="60" y2="43" stroke-width="4" opacity="0.9"/>
    <!-- handle -->
    <line class="cross" x1="64" y1="64" x2="86" y2="86" stroke-width="9"/>
  </svg>
</body>
</html>
